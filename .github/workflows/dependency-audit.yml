name: Dependency Audit

# Audit reports the full vulnerability state of the dependency tree. We run it
# on PRs as an informational signal (`continue-on-error`) so it doesn't block
# merges that don't change dependencies, and on a daily schedule + push to main
# as the authoritative source of remediation tracking.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    # Informational on PRs (vulns are inherited from main); blocking on push/schedule.
    continue-on-error: ${{ github.event_name == 'pull_request' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Run npm audit (critical only)
        run: npm audit --audit-level=critical
